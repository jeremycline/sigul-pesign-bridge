name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 0 * * SUN"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Support current stable and the toolchain that ships with
        # the latest RHEL 9 minor release. 9.5 targets 1.79, and
        # 9.6 targets 1.84
        #
        # https://issues.redhat.com/browse/RHEL-30070
        # https://issues.redhat.com/browse/RHEL-61964
        rust-toolchain: [stable, "1.79"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          toolchain: ${{matrix.rust-toolchain}}
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{steps.rust-toolchain.outputs.cachekey}}

      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo build
        run: cargo build
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings

      - name: Install test packages
        run: |
          sudo apt update
          sudo apt install pesign

          # pesign-client doesn't let you configure the socket location, so make it available to the world
          sudo mkdir -p /run/pesign/
          sudo chmod -R 777 /run/pesign/

      - name: cargo test
        run: cargo test --all-features --workspace --no-fail-fast

  integration-tests:
    name: Sigul Integration Tests
    runs-on: ubuntu-latest
    container: quay.io/jeremycline/sigul-pesign-bridge-ci:latest
    services:
      sigul-bridge:
        image: quay.io/jeremycline/sigul-pesign-bridge-ci:latest
        env:
          RUN_SIGUL_BRIDGE: true
        ports:
          # Server connects to this port
          - 44333:44333
          # Client connects to this port
          - 44334:44334
      sigul-server:
        image: quay.io/jeremycline/sigul-pesign-bridge-ci:latest
        env:
          RUN_SIGUL_SERVER: true

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up test environment
        run: |
          set -euo pipefail

          bash ./devel/sigul_key_setup.sh
          printf 'my-password\0my-password\0' | sigul --batch --config-file=devel/sigul-client.conf -v -v list-keys

          cargo build
          umask 027
          cargo run -- --socket=/run/pesign/socket listen &
          sleep 2

          pesign-client --token="my token" --certificate="my certificate" \
            --sign --infile=/boot/efi/EFI/almalinux/grubx64.efi \
            --outfile=grubx64-selfsigned.efi

          sbverify --list /boot/efi/EFI/almalinux/grubx64.efi
          sbverify --list grubx64-selfsigned.efi

          # Just a little smoke test
          if sbverify --cert ./signing-cert.pem /boot/efi/EFI/almalinux/grubx64.efi ; then
            echo "sbverify should not have succeeded!"
          fi

          sbverify --cert ./signing-cert.pem grubx64-selfsigned.efi
